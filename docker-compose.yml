services:
  postgres:
    image: postgres:16-alpine
    container_name: attendance_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: attendance
    ports:
      - "5432:5432"
    volumes:
      - attendance_pg_data:/var/lib/postgresql/data

volumes:
  attendance_pg_data:
